<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #f8fafc;
      background: #111827;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      width: min(760px, 100%);
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      color: #111827;
      font-size: 1rem;
    }

    .turn {
      min-height: 34px;
      margin-bottom: 16px;
      font-size: clamp(1.25rem, 4vw, 1.6rem);
      font-weight: 700;
      text-align: center;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      width: min(88vw, 640px);
      aspect-ratio: 1;
      border: 4px solid #374151;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 50px rgb(0 0 0 / 35%);
    }

    .square {
      border: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 7vw, 4rem);
      line-height: 1;
      cursor: pointer;
      transition: box-shadow 150ms ease, transform 150ms ease;
    }

    .square:focus-visible {
      outline: 3px solid #facc15;
      outline-offset: -3px;
    }

    .square:hover {
      transform: scale(1.03);
      z-index: 1;
    }

    .light {
      background: #bbf7d0;
      color: #111827;
    }

    .dark {
      background: #15803d;
      color: #f8fafc;
    }

    .selected {
      box-shadow: inset 0 0 0 5px #facc15;
    }

    .instructions {
      width: min(680px, 100%);
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      background: #1f2937;
      text-align: center;
      box-shadow: 0 18px 36px rgb(0 0 0 / 25%);
    }

    .instructions h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .instructions p {
      margin: 0;
      line-height: 1.5;
    }

    @media (max-width: 620px) {
      .players {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>♟ Chess Game</h1>

    <section class="players" aria-label="Player names">
      <div>
        <label for="white-player">White Player Name</label>
        <input id="white-player" type="text" value="Player 1">
      </div>
      <div>
        <label for="black-player">Black Player Name</label>
        <input id="black-player" type="text" value="Player 2">
      </div>
    </section>

    <div id="turn" class="turn"></div>
    <div id="board" class="board" aria-label="Chess board"></div>

    <section class="instructions">
      <h2>How to Play</h2>
      <p>Click one of your chess pieces first, then click the destination square. This simple two-player board switches turns after each move.</p>
    </section>
  </main>

  <script>
    const initialBoard = [
      ["♜", "♞", "♝", "♛", "♚", "♝", "♞", "♜"],
      ["♟", "♟", "♟", "♟", "♟", "♟", "♟", "♟"],
      ["", "", "", "", "", "", "", ""],
      ["", "", "", "", "", "", "", ""],
      ["", "", "", "", "", "", "", ""],
      ["", "", "", "", "", "", "", ""],
      ["♙", "♙", "♙", "♙", "♙", "♙", "♙", "♙"],
      ["♖", "♘", "♗", "♕", "♔", "♗", "♘", "♖"],
    ];

    let board = initialBoard.map((row) => [...row]);
    let selected = null;
    let turn = "White";

    const boardEl = document.getElementById("board");
    const turnEl = document.getElementById("turn");
    const whitePlayerEl = document.getElementById("white-player");
    const blackPlayerEl = document.getElementById("black-player");

    const isWhitePiece = (piece) => "♙♖♘♗♕♔".includes(piece);
    const isBlackPiece = (piece) => "♟♜♞♝♛♚".includes(piece);

    function currentPlayerName() {
      return turn === "White" ? whitePlayerEl.value || "Player 1" : blackPlayerEl.value || "Player 2";
    }

    function renderTurn() {
      turnEl.textContent = `Turn: ${currentPlayerName()} (${turn})`;
    }

    function handleSquareClick(row, col) {
      const piece = board[row][col];

      if (!selected) {
        const canSelect =
          piece &&
          ((turn === "White" && isWhitePiece(piece)) ||
            (turn === "Black" && isBlackPiece(piece)));

        if (canSelect) {
          selected = [row, col];
          renderBoard();
        }
        return;
      }

      const [selectedRow, selectedCol] = selected;
      board[row][col] = board[selectedRow][selectedCol];
      board[selectedRow][selectedCol] = "";
      selected = null;
      turn = turn === "White" ? "Black" : "White";
      renderBoard();
      renderTurn();
    }

    function renderBoard() {
      boardEl.innerHTML = "";

      board.forEach((row, rowIndex) => {
        row.forEach((piece, colIndex) => {
          const square = document.createElement("button");
          const isDark = (rowIndex + colIndex) % 2 === 1;
          const isSelected =
            selected &&
            selected[0] === rowIndex &&
            selected[1] === colIndex;

          square.type = "button";
          square.className = `square ${isDark ? "dark" : "light"} ${isSelected ? "selected" : ""}`;
          square.textContent = piece;
          square.setAttribute("aria-label", `${piece || "empty"} square ${rowIndex + 1}, ${colIndex + 1}`);
          square.addEventListener("click", () => handleSquareClick(rowIndex, colIndex));
          boardEl.appendChild(square);
        });
      });
    }

    whitePlayerEl.addEventListener("input", renderTurn);
    blackPlayerEl.addEventListener("input", renderTurn);

    renderBoard();
    renderTurn();
  </script>
</body>
</html>
